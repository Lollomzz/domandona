<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Una domanda importante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-top: 150px;
      text-align: center;
      background: #ffe4ec;
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 50px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
    }

    #yes {
      background-color: #4CAF50;
      color: white;
      margin-right: 20px;
      position: relative;
      z-index: 1;
    }

    #no {
      background-color: #f44336;
      color: white;
      position: absolute; /* assoluto rispetto al body */
      z-index: 1;
    }
  </style>
</head>
<body>

  <h1>Vuoi uscire con me? 💖</h1>

  <button id="yes" onclick="yesClicked()">Sì</button>
  <button id="no">No</button>

  <script>
    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");

    // inizializza il No accanto al Sì
    window.onload = () => {
      const yesRect = yesBtn.getBoundingClientRect();
      noBtn.style.top = yesRect.top + "px";
      noBtn.style.left = (yesRect.right + 10) + "px"; // piccolo offset a destra del Sì
    };

    function moveButton() {
      const padding = 10;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding;

      let x, y, overlap;
      do {
        x = Math.random() * maxX;
        y = Math.random() * maxY;

        const yesRect = yesBtn.getBoundingClientRect();
        const noRect = {left: x, top: y, right: x + noBtn.offsetWidth, bottom: y + noBtn.offsetHeight};

        overlap = !(noRect.right + 10 < yesRect.left || 
                    noRect.left - 10 > yesRect.right || 
                    noRect.bottom + 10 < yesRect.top || 
                    noRect.top - 10 > yesRect.bottom);
      } while(overlap);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", moveButton);

    function yesClicked() {
      document.body.innerHTML = "<h1>yee 🎉❤️<br><small>(non farmi aspettare di nuovo please)</small></h1>";
    }
  </script>

</body>
</html>
